<!DOCTYPE html>
<html lang="en">

<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>layout</title>

       <style>
              body {
                     background-color: lightgrey;
              }


              .container {

                     display: flex;
                     justify-content: space-around;
                     flex-direction: row;


              }

              .col {
                     width: 500px;
                     height: 600px;
                     display: flex;
                     flex-direction: column;
                     margin: 10px;
                     background-color:darkgray;


              }

              .item {
                     width: fit-content;
                     background-color: transparent;
                     margin: 40px;
                     margin-top: -6px;
              }

              .rohit {
                     width: 500px;
                     height: 600px;
                     display: flex;
                     flex-direction: row;
                     margin: 10px;
                     background-color: lightgreen;
              }

              img {
                     width: 100%;
                     gap: 50px;
                     margin: 2px;

              }

              .my {
                     display: flex;
                     background-color: green;
                     justify-content: center;
                     align-items: center;
                     flex-direction: column;
                     border-radius: 20px;
                     height: 200px;

              }

              input {
                     width: 200px;

                     padding: 10px;
                     margin: 10px;
                     border-radius: 10px;
              }

              .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(130px, 1fr));
    gap:16px;
  }

   .card{
    min-height:160px;
    padding:20px;
    background:#fffdf9;
    border:1px solid;
    border-radius:10px;
    margin: 7px;
  }
       </style>
</head>

<body>
       <div class="container">



              <div class="col">
                     <div>ONE</div>
                     <div class="item">
                            <img src="pics/banaars.jpg3.jpg">
                            <img src="pics/banaars.jpg3.jpg">
                            <img src="pics/banaras.jpg2.jpg">
                     </div>
              </div>
              <div class="col">TWO</div>

              <div class="col">THREE

                     <div class="my">

                            <input type=" text" placeholder="My Website">
                            <input type="text" placeholder="Bookmarks Priview">
                     </div>

                     <div class="cards">
                            <div class="card">Card 1</div>
                            <div class="card">Card 2</div>
                            <div class="card">Card 3</div>
                            <div class="card">Card 4</div>
                     </div>
              </div>
       </div>

</body>

</html>
