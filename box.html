<!DOCTYPE html>
<html lang="en">

<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Responsive Layout</title>

       <style>
              body {
                     background-color: lightgrey;
                     margin: 0;
              }

              .container {
                     display: flex;
                     flex-wrap: wrap;
                     justify-content: center;
              }

              .col {
                     width: 100%;
                     max-width: 350px;
                     min-height: 400px;
                     display: flex;
                     flex-direction: column;
                     margin: 10px;
                     background-color: darkgray;
                     padding: 10px;
              }

              .item img {
                     width: 100%;
                     margin: 5px 0;
                     border-radius: 10px;
              }

              .my {
                     display: flex;
                     background-color: green;
                     justify-content: center;
                     align-items: center;
                     flex-direction: column;
                     border-radius: 20px;
                     padding: 10px;
              }

              input {
                     width: 90%;
                     padding: 10px;
                     margin: 10px;
                     border-radius: 10px;
                     border: none;
              }

              .cards {
                     display: grid;
                     grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                     gap: 10px;
              }

              .card {
                     min-height: 100px;
                     padding: 10px;
                     background: #fffdf9;
                     border: 1px solid black;
                     border-radius: 10px;
              }

              @media (min-width: 768px) {
                     .container {
                            flex-wrap: nowrap;
                            justify-content: space-around;
                     }

                     .col {
                            width: 30%;
                     }
              }
       </style>
</head>

<body>

       <div class="container">

              <div class="col">
                     <div>ONE</div>
                     <div class="item">
                            <img src="pics/banaars.jpg3.jpg">
                            <img src="pics/banaars.jpg3.jpg">
                            <img src="pics/banaras.jpg2.jpg">
                     </div>
              </div>

              <div class="col">TWO</div>

              <div class="col">
                     THREE

                     <div class="my">
                            <input type="text" placeholder="My Website">
                            <input type="text" placeholder="Bookmarks Preview">
                     </div>

                     <div class="cards">
                            <div class="card">Card 1</div>
                            <div class="card">Card 2</div>
                            <div class="card">Card 3</div>
                            <div class="card">Card 4</div>
                     </div>
              </div>

       </div>

</body>

</html>
