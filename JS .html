<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy me</title>

  <style>
    body {
      margin: 0;
      padding: 30px;
      background: #fff7ed;
      font-family: sans-serif;
    }

    .market {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    img {
      width: 300px;
      height: 170px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      border: none;
      border-radius: 50px;
      background: orange;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="market">
    <div class="card">
      <h2>Fortuner</h2>
      <img
        src="https://stimg.cardekho.com/images/carexteriorimages/930x620/Toyota/Fortuner/10904/1755846017683/front-left-side-47.jpg">
      <button>Buy ₹1,000</button>
    </div>

    <div class="card">
      <h2>R15</h2>
      <img src="https://www.yamaha-motor-india.com/theme/v4/images/webp_images/r_series_all/r15v4/r15v4-sp.webp?v=50">
      <button>Buy ₹200</button>
    </div>

    <div class="card">
      <h2>TATA Sierra</h2>
      <img src="https://media.fortuneindia.com/fortune-india/2025-11-26/lc6kj5sf/Image-1.JPG">
      <button>Buy ₹500</button>
    </div>

    <div class="card">
      <h2>Honda</h2>
      <img
        src="https://www.livehindustan.com/lh-img/smart/img/2025/06/17/original/Honda_CBR650R_E-Clutch_1750149619986.jpg">
      <button>Buy ₹100</button>
    </div>

    <div class="card">
      <h2>THAR</h2>
      <img src="https://imgd.aeplcdn.com/664x374/n/oquamhb_1877457.jpg?q=80">
      <button>Buy ₹2,000</button>
    </div>

    <div class="card">
      <h2>Scorpio</h2>
      <img src="https://media.zigcdn.com/media/model/2026/Mar/mahindra-scorpio-n_600x400.jpg">
      <button>Buy ₹1,500</button>
    </div>

    <div class="card">
      <h2>B M W</h2>
      <img
        src="https://png.pngtree.com/thumb_back/fh260/background/20240912/pngtree-bmw-rides-on-water-spray-from-the-car-front-view-image_16168707.jpg">
      <button>Buy ₹10,000</button>
    </div>

    <div class="card">
      <h2>Lemborghini</h2>
      <img
        src="https://static.vecteezy.com/system/resources/thumbnails/053/733/179/small/every-detail-of-a-sleek-modern-car-captured-in-close-up-photo.jpg">
      <button>Buy ₹20,000</button>
    </div>

  </div>

</body>

</html>
